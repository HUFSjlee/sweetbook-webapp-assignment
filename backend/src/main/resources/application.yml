server:
  port: ${SERVER_PORT:8080}

sweetbook:
  api:
    base-url: ${SWEETBOOK_API_BASE_URL:https://api-sandbox.sweetbook.com/v1}
    key: ${SWEETBOOK_API_KEY:}

supabase:
  url: ${SUPABASE_URL:}
  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:${SUPABASE_SERVICE_KEY:}}
  storage-bucket: ${SUPABASE_STORAGE_BUCKET:travel-assets}

spring:
  datasource:
    url: ${SUPABASE_DB_URL:jdbc:h2:file:./build/travelogbook;MODE=PostgreSQL;AUTO_SERVER=TRUE}
    username: ${SUPABASE_DB_USERNAME:sa}
    password: ${SUPABASE_DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

app:
  public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:8080}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}
  storage:
    mode: ${APP_STORAGE_MODE:local}
    local-root: ${APP_STORAGE_LOCAL_ROOT:./build/storage}
